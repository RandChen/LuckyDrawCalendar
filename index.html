<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Draw Calendar</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png">
    <!-- Modern Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FullCalendar -->
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <header>
            <h1>幸運抽籤日曆</h1>
            <p>掌握近期新股抽籤時程與費用</p>
        </header>

        <main>
            <div id="calendar-container">
                <div id='calendar'></div>
            </div>

            <div class="data-panel">
                <h2>近期可申購股票一覽</h2>

                <div class="logic-selector-container">
                    <p class="logic-question">若 A 股票退款和 B 股票扣款為同日，您的證券戶會：</p>
                    <div class="logic-options">
                        <label class="logic-option">
                            <input type="radio" name="fundingLogic" value="1" checked>
                            <span class="radio-label">1. 先退款，才扣款</span>
                        </label>
                        <label class="logic-option">
                            <input type="radio" name="fundingLogic" value="2">
                            <span class="radio-label">2. 先扣款，才退款</span>
                        </label>
                    </div>
                </div>

                <div class="loading" id="loading">載入中，請稍候...</div>
                <div class="stock-list" id="stock-list" style="display: none;">
                    <!-- Stock items will be generated here -->
                </div>
            </div>
        </main>

        <footer>
            <p>&copy; <span id="year"></span> Rand Chen. All rights reserved.</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>

</html>
